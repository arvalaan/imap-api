services:
  redis:
    image: redis:7-alpine
    container_name: imapapi-redis
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  imapapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imapapi-app
    depends_on:
      redis:
        condition: service_healthy
    network_mode: host
    command: ["node", "server.js", "--dbs.redis=redis://127.0.0.1:6379/8", "--api.host=127.0.0.1", "--api.port=3000"]
    environment:
      - NODE_ENV=production
    restart: unless-stopped
